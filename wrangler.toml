# 🔒 Cloudflare Worker Zero Trust Configuration
# ZERO-KEY-IN-CODE ARCHITEKTUR
# Keine API-Keys oder Secrets in dieser Datei!
# Authentifizierung erfolgt ausschließlich via 'wrangler login' (browser based)

name = "pLedge-security-edge"
main = "cloudflare-worker.js"
compatibility_date = "2026-07-06"
workers_dev = false

# 🔒 ZERO TRUST SECURITY:
# Keine account_id oder API-Keys hier!
# Deployment via lokalem wrangler login (Hardware-bound authentication)
# 
# Deployment Befehle:
#   wrangler login   # Einmalig im Terminal (öffnet Browser für Auth)
#   wrangler deploy  # Veröffentlicht den Worker

# Production Route für pLedge250freedom.gov.eu
[routes]
pattern = "pLedge250freedom.gov.eu/*"
zone_name = "gov.eu"

# Staging Route (optional)
# [env.staging]
# name = "pLedge-security-edge-staging"
# workers_dev = true