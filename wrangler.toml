#
# Cloudflare Worker Configuration - Zero Trust Deployment
# Keine API Keys im Repo - nur Umgebungsvariablen

name = "hnoss-secure-tunnel"
main = "cloudflare-worker.js"
account_id = "${CF_ACCOUNT_ID}"
zone_id = "${CF_ZONE_ID}"

# Workers v4 Syntax (Best Practice)
workers_dev = true
compatibility_date = "2024-01-01"

[vars]
HNOSS_DOMAIN_SIGNATURE = "${HNOSS_DOMAIN_SIGNATURE}"
TUNNEL_ID = "${TUNNEL_ID}"
BUILD_HASH = "${BUILD_HASH}"

# Secrets via: wrangler secret put SECRET_NAME
# - API_TOKEN (optional for advanced routing)
# - TUNNEL_KEY (for tunnel authentication)

[env.production]
name = "hnoss-secure-tunnel-prod"
# Route für pLedge250freedom.gov.eu
routes = ["pLedge250freedom.gov.eu/*"]
zone_id = "${CF_ZONE_ID_PROD}"

[env.staging]
name = "hnoss-secure-tunnel-staging"
workers_dev = true
