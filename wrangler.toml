name = "hnoss-secure-tunnel"
main = "cloudflare-worker.js"
account_id = "${CF_ACCOUNT_ID}"
zone_id = "${CF_ZONE_ID}"

workers_dev = true
compatibility_date = "2024-01-01"

[vars]
HNOSS_DOMAIN_SIGNATURE = "${HNOSS_DOMAIN_SIGNATURE}"
TUNNEL_ID = "${TUNNEL_ID}"
BUILD_HASH = "${BUILD_HASH}"

# Secrets (werden über wrangler secret put gesetzt)
# wrangler secret put API_TOKEN
# wrangler secret put TUNNEL_KEY

[env.production]
name = "hnoss-secure-tunnel-prod"
route = "pLedge250freedom.gov.eu/*"
zone_id = "${CF_ZONE_ID_PROD}"

[env.staging]
name = "hnoss-secure-tunnel-staging"
workers_dev = true